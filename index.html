<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timer App</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 transition duration-300">

  <!-- Container -->
  <div class="min-h-screen flex flex-col items-center justify-center">

    <!-- Toggle Button -->
    <button id="themeToggle"
      class="absolute top-5 right-5 p-3 rounded-full bg-gray-800 text-white dark:bg-gray-200 dark:text-black flex items-center justify-center"
      aria-label="Toggle dark mode">
      <!-- Moon/Sun Icon SVG (toggles for light/dark mode) -->
      <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path class="dark:hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-10.34l-.71.71m-14.14 0l-.71-.71m16 .01l-.71.71m-14.14 0l-.71-.71m16 .01l-.71.71m-14.14 0l-.71-.71M21 12h-1M4 12H3m16.66 8.66l-.71-.71m-14.14 0l-.71.71M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path class="hidden dark:inline" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
      </svg>
    </button>

    <!-- Timer Circle -->
    <div class="w-60 h-60 sm:w-72 sm:h-72 rounded-full border-8 border-gray-800 dark:border-white 
                flex items-center justify-center shadow-xl">

      <span id="timer"
        class="text-4xl sm:text-5xl font-bold text-gray-800 dark:text-white">
        00:00
      </span>
    </div>

    <!-- Start Button -->
    <button id="startBtn"
      class="mt-10 px-8 py-3 bg-blue-600 text-white rounded-xl text-lg hover:bg-blue-700 transition">
      Start
    </button>

  </div>

  <script src="script.js"></script>

</body>
</html>
